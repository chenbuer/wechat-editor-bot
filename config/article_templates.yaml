# 文章模板配置
# 定义不同类型文章的三部分结构：summary（引用格式）、body（正文）、footer（页脚）

templates:
  # 财经日报模板
  financial_report:
    name: "财经日报"

    # 标题格式配置（支持时段格式或空字符串让 AI 生成）
    title_formats:
      morning: "财经早报 | {date}"
      afternoon: "财经速递 | {date}"
      evening: "财经日报 | {date}"

    # 新闻搜索配置
    news_search:
      enabled: true
      query: "最新财经新闻 股市行情 A股港股美股指数 经济数据指标 宏观政策 国际经济动态"
      num_results: 50
      use_autoprompt: true
      include_domains: []
      exclude_keywords:
        - "加密货币"
        - "比特币"
        - "赌博"
      time_range: 24

    summary:
      title: "📝 编者按"
      style: "quote"  # 使用引用格式
      prompt: "用 2-3 句话概括今日市场核心要点，语气轻松但专业。"

    body:
      # 提供参考结构，但允许 AI 灵活调整
      reference_structure: |
        ## 一、新闻速递
        ### 🇨🇳 国内要闻
        ### 🌍 国际动态

        ## 二、市场表现
        ### 🏦 A股市场
        ### 🦀 美股市场
        ### 🐂 全球市场

        ## 三、市场展望

      prompt: |
        根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

        **重要：标题结构限制**
        - 一级标题：使用 ## + emoji，如 "## 一、新闻速递"
        - 二级标题：使用 ### + emoji，如 "### 🇨🇳 国内要闻"
        - 最多两级标题，不要使用 #### 或更深层级

        **一、新闻速递**
        - 国内要闻：列举国内重要财经新闻，每条新闻标题简洁有力，1-2句话说明要点和影响
        - 国际动态：列举国际重要财经新闻（如无相关素材可省略）

        **二、市场表现**
        - A股市场：整理指数表现、热门板块、市场情绪（如无具体数据，使用描述性词汇）
        - 美股市场：（如无相关素材可省略）
        - 全球市场：（如无相关素材可省略）

        **三、市场展望**
        - 分析市场可能的走势、需要关注的关键因素、投资者应注意的风险点

        注意：
        - 使用分隔线（---）区分章节
        - 大章节标题使用 ## 一、## 二、## 三、
        - 小标题使用 ###
        - 重要信息用 **加粗**
        - 适当使用 emoji 增加可读性（📈📉💰🔥⚡️等）
        - 禁止使用列表，使用段落表述

    footer:
      content: |
        本文内容仅供参考，不构成投资建议。投资有风险，入市需谨慎。
        关注我们，获取更多财经资讯。

  # 科技资讯模板
  tech_news:
    name: "科技资讯"

    # 标题格式配置（空字符串表示由 AI 生成标题）
    title_formats: ""

    # 新闻搜索配置
    news_search:
      enabled: true
      query: "最新科技新闻 人工智能 芯片半导体 新产品发布 科技公司动态"
      num_results: 30
      use_autoprompt: true
      include_domains: []
      exclude_keywords:
        - "加密货币"
        - "赌博"
      time_range: 24

    summary:
      title: "💡 今日看点"
      style: "quote"
      prompt: "用 2-3 句话概括今日科技领域的核心动态和趋势。"

    body:
      reference_structure: |
        ## 一、重磅新闻
        ## 二、产品与技术
        ## 三、行业动态
        ## 四、趋势观察

      prompt: |
        根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

        **重要：标题结构限制**
        - 一级标题：使用 ## + emoji
        - 二级标题：使用 ### + emoji
        - 最多两级标题，不要使用 #### 或更深层级

        **一、重磅新闻**
        - 列举最重要的科技新闻，每条包含标题和2-3句话的解读

        **二、产品与技术**
        - 新产品发布、技术突破等（如无相关素材可省略）

        **三、行业动态**
        - 公司动态、融资并购、政策法规等

        **四、趋势观察**
        - 基于新闻素材分析科技行业的发展趋势和影响

        注意：
        - 使用分隔线（---）区分章节
        - 章节标题使用 ## 一、## 二、格式
        - 小标题使用 ###
        - 适当使用 emoji（💻🚀🔬🤖⚡️等）
        - 语言风格轻松但专业

    footer:
      content: |
        本文内容仅供参考，不代表投资建议。
        关注我们，获取更多科技资讯。

  # 通用新闻摘要模板
  general_news:
    name: "新闻摘要"

    # 标题格式配置（空字符串表示由 AI 生成标题）
    title_formats: ""

    # 新闻搜索配置
    news_search:
      enabled: true
      query: "最新新闻 热点事件 重要动态"
      num_results: 30
      use_autoprompt: true
      include_domains: []
      exclude_keywords: []
      time_range: 24

    summary:
      title: "📰 今日要闻"
      style: "quote"
      prompt: "用 2-3 句话概括今日新闻的核心内容和重要性。"

    body:
      reference_structure: |
        ## 一、核心新闻
        ## 二、深度解读
        ## 三、相关影响

      prompt: |
        根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

        **重要：标题结构限制**
        - 一级标题：使用 ## + emoji
        - 二级标题：使用 ### + emoji
        - 最多两级标题，不要使用 #### 或更深层级

        **一、核心新闻**
        - 按重要性列举新闻，每条包含标题和简要说明

        **二、深度解读**
        - 对重要新闻进行深入分析和背景介绍

        **三、相关影响**
        - 分析这些新闻可能带来的影响和后续发展

        注意：
        - 使用分隔线（---）区分章节
        - 章节标题使用 ## 一、## 二、格式
        - 语言客观中立，事实准确
        - 适当使用 emoji 提升可读性

    footer:
      content: |
        本文内容仅供参考，不代表任何立场。
        关注我们，获取更多资讯。

  # 知识解读模板（解释经济名词、历史事件等）
  knowledge_explanation:
    name: "知识解读"

    # 标题格式配置（空字符串表示由 AI 生成标题）
    title_formats: ""

    # 新闻搜索配置
    news_search:
      enabled: false  # 知识解读默认不需要实时新闻
      # 如果需要案例参考，可以设置为 true 并配置 query
      # query: "{topic} 最新新闻 案例 分析"
      # num_results: 20
      # use_autoprompt: true
      # time_range: 168  # 7天 = 168小时

    summary:
      title: "🎯 核心要点"
      style: "quote"
      prompt: "用 2-3 句话说明本文要解读的主题及其重要性。"

    body:
      reference_structure: |
        ## 一、背景介绍
        ## 二、核心概念
        ## 三、实际案例
        ## 四、当前影响

      prompt: |
        根据提供的主题撰写知识解读文章，参考以下结构（可根据内容灵活调整）：

        **重要：标题结构限制**
        - 一级标题：使用 ## + emoji
        - 二级标题：使用 ### + emoji
        - 最多两级标题，不要使用 #### 或更深层级

        **一、背景介绍**
        - 介绍该主题的历史背景和产生原因

        **二、核心概念**
        - 清晰解释关键概念、术语和机制

        **三、实际案例**
        - 结合提供的新闻素材或历史案例进行说明

        **四、当前影响**
        - 分析该主题在当前环境下的意义和影响

        注意：
        - 使用分隔线（---）区分章节
        - 章节标题使用 ## 一、## 二、格式
        - 语言通俗易懂，避免过于专业的术语
        - 适当使用 emoji（📚💡🔍📊等）
        - 注重知识性和可读性的平衡

    footer:
      content: |
        本文内容仅供学习参考，不构成任何建议。
        关注我们，获取更多知识解读。

# 通用写作要求（适用于所有模板）
common_requirements:
  authenticity: "严格只使用提供的新闻素材，不要编造任何数据、新闻或信息"
  data_handling: "如果新闻中有具体数字就使用，没有就用描述性词汇，不要编造"
  length: "根据新闻素材的丰富程度灵活调整，保持内容充实但不冗余"
  compliance: "遵守内容监管规定，不涉及敏感话题"
  formatting:
    - "使用分隔线（---）区分章节"
    - "重要信息用 **加粗**"
    - "禁止使用列表，取而代之使用段落"
