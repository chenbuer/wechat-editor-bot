# 科技资讯模板
name: "科技资讯"

# 标题格式配置（空字符串表示由 AI 生成标题）
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: true
  query: "最新科技新闻 人工智能 芯片半导体 新产品发布 科技公司动态"
  num_results: 30
  use_autoprompt: true
  include_domains: []
  exclude_keywords:
    - "加密货币"
    - "赌博"
  time_range: 24

summary:
  title: "💡 今日看点"
  style: "quote"
  prompt: "用 2-3 句话概括今日科技领域的核心动态和趋势。"

body:
  reference_structure: |
    ## 一、重磅新闻
    ## 二、产品与技术
    ## 三、行业动态
    ## 四、趋势观察

  prompt: |
    根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    **一、重磅新闻**
    - 列举最重要的科技新闻，每条包含标题和2-3句话的解读

    **二、产品与技术**
    - 新产品发布、技术突破等（如无相关素材可省略）

    **三、行业动态**
    - 公司动态、融资并购、政策法规等

    **四、趋势观察**
    - 基于新闻素材分析科技行业的发展趋势和影响

    注意：
    - 使用分隔线（---）区分章节
    - 章节标题使用 ## 一、## 二、格式
    - 小标题使用 ###
    - 适当使用 emoji（💻🚀🔬🤖⚡️等）
    - 语言风格轻松但专业

footer:
  content: |
    本文内容仅供参考，不代表投资建议。
    关注我们，获取更多科技资讯。
