# 新闻快讯模板
name: "新闻快讯"

# 标题格式配置（由 AI 生成标题）
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: true
  query: "{topic} 突发新闻 重大事件"
  num_results: 50
  use_autoprompt: true  # 启用自动优化
  search_type: "auto"  # 自动选择最佳搜索模式
  include_domains: []
  exclude_keywords: []
  time_range: 12

summary:
  title: "⚡️ 快讯摘要"
  style: "quote"
  prompt: "用 1-2 句话快速概括最重要的新闻要点，简明扼要。"

body:
  reference_structure: |
    ## 核心快讯
    ## 要点解读

  prompt: |
    根据提供的新闻素材撰写快讯，参考以下结构（可根据内容灵活调整）：

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji，如 "## 核心快讯"
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    **核心快讯**
    - 快速列举 3-5 条最重要的新闻
    - 每条新闻用 1-2 句话说明核心要点
    - 按 importance 排序，最重要的放前面

    **要点解读**
    - 选择 1-2 条最重要或最有趣的新闻进行简要解读
    - 说明背景、影响或后续发展

    注意：
    - 保持简洁明快，每条新闻控制在 50 字以内
    - 使用快讯风格的标题，如 "突发"、"重磅"、"速递"
    - 适当使用 emoji 增加可读性（⚡️🔥📈💰等）
    - 语言简洁有力，避免冗长描述
    - 总字数控制在 500-800 字

footer:
  content: |
    本文内容仅供参考，关注我们获取更多快讯资讯。
