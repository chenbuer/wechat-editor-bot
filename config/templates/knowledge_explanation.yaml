# 知识解读模板（解释经济名词、历史事件等）
name: "知识解读"

# 标题格式配置
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: true
  query: "{topic} 知识解读 背景 分析 案例"
  num_results: 20
  use_autoprompt: true  # 启用自动优化
  search_type: "auto"  # 自动选择最佳搜索模式
  time_range: 168  # 7天 = 168小时

summary:
  title: ""
  style: "quote"
  prompt: "用最新2-3条新闻作为引子切入话题，并抛出核心问题，引发读者对深层背景的思考：这背后有着怎样的深层根源？我们应如何理解？"

body:
  reference_structure: |
    ## 一、背景溯源
    ## 二、核心剖析
    ## 三、延伸思考

  prompt: |
    **写作定位**：这是一篇以新闻为引子的知识深度解读文章，而非新闻综述。新闻引子已在摘要部分呈现。

    **核心写作逻辑**：
    - 直接进入深度分析，主体内容聚焦该主题的背景、核心概念、深层逻辑等
    - 将summary中的新闻热点与知识背景建立关联
    - 90-95%来自你自己的知识库，5-10%关联新闻素材

    **参考结构**：

    **一、背景溯源**（核心部分，占全文40%）
    - 【必用知识库】从历史/理论/技术角度介绍该主题的起源和背景
    - 关键历史节点、理论发展脉络、或技术演进过程
    - 这些背景如何影响今日的理解和应用

    **二、核心剖析**（核心部分，占全文40%）
    - 【必用知识库】深入解析该主题的核心概念、关键机制、或深层逻辑
    - 根据话题性质，可涵盖：概念定义、理论框架、技术原理、文化因素、社会机制等
    - 帮助读者建立系统性的认知框架

    **三、延伸思考**（收尾，占全文20%）
    - 理论与实践的对照
    - 该主题在当下环境中的现实意义
    - 对未来发展的展望或思考

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    注意：
    - 使用分隔线（---）区分章节
    - 不要重复新闻内容，直接进入深度分析
    - 主体内容聚焦历史和文化分析，来自你的知识库
    - 语言客观中立，适当使用 emoji 提升可读性
    - 用自然语言描述内容，避免"素材指出"这样的表述

footer:
  content: |
    本文内容仅供学习参考，不构成任何建议。
    关注我们，获取更多知识解读。
