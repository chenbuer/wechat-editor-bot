# 知识解读模板（解释经济名词、历史事件等）
name: "知识解读"

# 标题格式配置
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: true
  query: "{topic} 知识解读 背景 分析 案例"
  num_results: 20
  use_autoprompt: false
  search_type: "keyword"
  time_range: 168  # 7天 = 168小时

summary:
  title: "🎯 核心要点"
  style: "quote"
  prompt: "用 2-3 句话说明本文要解读的主题及其重要性。"

body:
  reference_structure: |
    ## 一、背景介绍
    ## 二、核心概念
    ## 三、实际案例
    ## 四、当前影响

  prompt: |
    **内容比例要求：**
    - 90-95%：来自你自己的知识库（历史背景、宗教概念、文化内涵、学术理论等）
    - 5-10%：引用新闻素材作为"当前案例"或"现实影响"

    根据提供的主题撰写知识解读文章，参考以下结构（可根据内容灵活调整）：

    **内容比例要求：**
    - 90-95%：来自你自己的知识库（历史背景、宗教概念、文化内涵、学术理论等）
    - 5-10%：引用新闻素材作为"当前案例"或"现实影响"

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    **一、背景介绍**
    - 【必用知识库】介绍该主题的历史背景和产生原因
    - 深入挖掘历史背景，不要局限于新闻素材

    **二、核心概念**
    - 【必用知识库】清晰解释关键概念、术语和机制
    - 使用学术理论、宗教概念、文化背景等

    **三、实际案例**
    - 【可用新闻素材】结合提供的新闻素材或历史案例进行说明
    - 将知识概念应用到现实案例中

    **四、当前影响**
    - 【可用新闻素材】分析该主题在当前环境下的意义和影响
    - 可以引用新闻素材反映的现实问题

    注意：
    - 使用分隔线（---）区分章节
    - 章节标题使用 ## 一、## 二、格式
    - 语言通俗易懂，避免过于专业的术语
    - 适当使用 emoji（📚💡🔍📊等）
    - 注重知识性和可读性的平衡
    - 用自然语言描述内容，避免"素材指出"这样的表述

footer:
  content: |
    本文内容仅供学习参考，不构成任何建议。
    关注我们，获取更多知识解读。
