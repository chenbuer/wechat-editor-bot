# 知识解读模板（解释经济名词、历史事件等）
name: "知识解读"

# 标题格式配置（空字符串表示由 AI 生成标题）
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: false  # 知识解读默认不需要实时新闻
  # 如果需要案例参考，可以设置为 true 并配置 query
  # query: "{topic} 最新新闻 案例 分析"
  # num_results: 20
  # use_autoprompt: true
  # time_range: 168  # 7天 = 168小时

summary:
  title: "🎯 核心要点"
  style: "quote"
  prompt: "用 2-3 句话说明本文要解读的主题及其重要性。"

body:
  reference_structure: |
    ## 一、背景介绍
    ## 二、核心概念
    ## 三、实际案例
    ## 四、当前影响

  prompt: |
    根据提供的主题撰写知识解读文章，参考以下结构（可根据内容灵活调整）：

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    **一、背景介绍**
    - 介绍该主题的历史背景和产生原因

    **二、核心概念**
    - 清晰解释关键概念、术语和机制

    **三、实际案例**
    - 结合提供的新闻素材或历史案例进行说明

    **四、当前影响**
    - 分析该主题在当前环境下的意义和影响

    注意：
    - 使用分隔线（---）区分章节
    - 章节标题使用 ## 一、## 二、格式
    - 语言通俗易懂，避免过于专业的术语
    - 适当使用 emoji（📚💡🔍📊等）
    - 注重知识性和可读性的平衡

footer:
  content: |
    本文内容仅供学习参考，不构成任何建议。
    关注我们，获取更多知识解读。
