# 通用新闻摘要模板
name: "新闻摘要"

# 标题格式配置（空字符串表示由 AI 生成标题）
title_formats: ""

# 新闻搜索配置
news_search:
  enabled: true
  query: "{topic} 最新新闻 热点事件 重要动态"
  num_results: 30
  use_autoprompt: false  # 禁用自动优化
  search_type: "keyword"  # 使用关键词搜索
  include_domains: []
  exclude_keywords: []
  time_range: 24

summary:
  title: "📰 今日要闻"
  style: "quote"
  prompt: "用 2-3 句话概括今日新闻的核心内容和重要性。"

body:
  reference_structure: |
    ## 一、核心新闻
    ## 二、深度解读
    ## 三、相关影响

  prompt: |
    根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji
    - 二级标题：使用 ### + emoji
    - 最多两级标题，不要使用 #### 或更深层级

    **一、核心新闻**
    - 按重要性列举新闻，每条包含标题和简要说明

    **二、深度解读**
    - 对重要新闻进行深入分析和背景介绍

    **三、相关影响**
    - 分析这些新闻可能带来的影响和后续发展

    注意：
    - 使用分隔线（---）区分章节
    - 章节标题使用 ## 一、## 二、格式
    - 语言客观中立，事实准确
    - 适当使用 emoji 提升可读性

footer:
  content: |
    本文内容仅供参考，不代表任何立场。
    关注我们，获取更多资讯。
