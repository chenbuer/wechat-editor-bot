# 财经日报模板
name: "财经日报"

# 标题格式配置（支持时段格式或空字符串让 AI 生成）
title_formats:
  morning: "财经早报 | {date}"
  afternoon: "财经速递 | {date}"
  evening: "财经日报 | {date}"

# 新闻搜索配置
news_search:
  enabled: true
  query: "{topic} 中美财经新闻 宏观经济 金融市场 政策解读 国际形势 美股 地缘政治"
  num_results: 100
  use_autoprompt: true  # 启用自动优化，提升搜索效果
  search_type: "auto"  # 自动选择最佳搜索模式
  include_domains: []
  exclude_keywords:
    - "加密货币"
    - "比特币"
    - "赌博"
  time_range: 24

summary:
  title: ""
  style: "quote"  # 使用引用格式
  prompt: "用 2-3 句话概括今日市场核心要点，语气轻松但专业。"

body:
  # 提供参考结构，但允许 AI 灵活调整
  reference_structure: |
    ## 一、新闻速递
    ### 🇨🇳 国内要闻
    ### 🌍 国际动态

    ## 二、市场表现
    ### 🏦 A股市场
    ### 🦀 美股市场
    ### 🐂 全球市场

    ## 三、市场展望

  prompt: |
    根据提供的新闻素材撰写正文，参考以下结构（可根据内容灵活调整）：

    **重要：标题结构限制**
    - 一级标题：使用 ## + emoji，如 "## 一、新闻速递"
    - 二级标题：使用 ### + emoji，如 "### 🇨🇳 国内要闻"
    - 最多两级标题，不要使用 #### 或更深层级

    **一、新闻速递**
    - 国内要闻：列举国内重要财经新闻，每条新闻标题简洁有力，1-2句话说明要点和影响
    - 国际动态：列举国际重要财经新闻（如无相关素材可省略）

    **二、市场表现**
    - A股市场：整理指数表现、热门板块、市场情绪（如无具体数据，使用描述性词汇）
    - 美股市场：（如无相关素材可省略）
    - 全球市场：（如无相关素材可省略）

    **三、市场展望**
    - 分析市场可能的走势、需要关注的关键因素、投资者应注意的风险点

    注意：
    - 使用分隔线（---）区分章节
    - 大章节标题使用 ## 一、## 二、## 三、
    - 小标题使用 ###
    - 重要信息用 **加粗**
    - 适当使用 emoji 增加可读性（📈📉💰🔥⚡️等）
    - 禁止使用列表，使用段落表述

footer:
  content: |
    本文内容仅供参考，不构成投资建议。
    关注我们，获取更多财经资讯。
