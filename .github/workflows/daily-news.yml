name: Daily Financial News

on:
  schedule:
    # 每天北京时间 07:00 运行 (UTC 23:00，即前一天 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Get current time in Asia/Shanghai timezone
      id: time
      run: |
        echo "current_time=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
        echo "current_hour=$(TZ='Asia/Shanghai' date +'%H')" >> $GITHUB_OUTPUT
        echo "📅 当前东八区时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Create secrets.yaml from GitHub Secrets
      run: |
        mkdir -p config
        cat > config/secrets.yaml << 'EOF'
        wechat:
          appid: "${{ secrets.WECHAT_APPID }}"
          secret: "${{ secrets.WECHAT_SECRET }}"

        api:
          # Exa API（用于新闻搜索）
          exa_api_key: "${{ secrets.EXA_API_KEY }}"

          # DeepSeek API（推荐）
          deepseek_key: "${{ secrets.DEEPSEEK_API_KEY }}"
          deepseek_base_url: "https://api.deepseek.com"
          deepseek_model: "deepseek-chat"

          # Claude API（备选）
          anthropic_key: "${{ secrets.ANTHROPIC_API_KEY }}"

          # 天气 API（可选）
          weather_api_key: "${{ secrets.WEATHER_API_KEY }}"

          # 图片生成 API
          image_provider: "${{ secrets.IMAGE_PROVIDER }}"
          image_key: "${{ secrets.IMAGE_API_KEY }}"
          image_base_url: "${{ secrets.IMAGE_BASE_URL }}"
          image_model: "${{ secrets.IMAGE_MODEL }}"
        EOF

    - name: Run financial news bot
      run: uv run python finance_news_bot.py
      env:
        TZ: 'Asia/Shanghai'

    - name: Upload generated articles
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: news-articles-${{ github.run_number }}
        path: |
          output/articles/*.md
          output/html/*.html
        retention-days: 30

    - name: Upload generated images
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: news-images-${{ github.run_number }}
        path: output/images/*.jpg
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ github.run_number }}
        path: "*.log"
        retention-days: 7

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ 财经新闻生成失败"
        echo "请检查日志了解详情"
